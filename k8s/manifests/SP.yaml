apiVersion: apps/v1
kind: Deployment
metadata:
  name: statuspage-web-deployment
  labels:
    workload: StatusPage-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      workload: StatusPage-ui
  template:
    metadata:
      labels:
        workload: StatusPage-ui
    spec:
      containers:
      - name: statuspage-frontend
        image: ecr-repo/StatusPage:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: 256Mi
            cpu: 100m
          limits:
            memory: 512Mi
            cpu: 500m